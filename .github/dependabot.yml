# To get started with Dependabot version updates, you'll need to specify which
# package ecosystems to update and where the package manifests are located.
# Please see the documentation for all configuration options:
# https://docs.github.com/code-security/dependabot/dependabot-version-updates/configuration-options-for-the-dependabot.yml-file

version: 2
updates:
  # Maintain dependencies for npm (frontend)
  - package-ecosystem: "npm"
    directory: "/frontend" # Location of package.json
    schedule:
      interval: "weekly"

  # Maintain dependencies for npm (backend)
  - package-ecosystem: "npm"
    directory: "/backend" # Location of package.json
    schedule:
      interval: "weekly"

  # Maintain dependencies for pip (ML service)
  - package-ecosystem: "pip"
    directory: "/ml" # Location of requirements.txt
    schedule:
      interval: "weekly"
